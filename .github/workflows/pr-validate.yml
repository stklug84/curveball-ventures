name: PR validation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: pr-validate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # REQUIRED status check — wire this into branch protection on main.
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload site artifact
        uses: actions/upload-artifact@v7
        with:
          name: site
          path: _site/
          retention-days: 1

  html-validate:
    name: html-validate (advisory)
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Download site
        uses: actions/download-artifact@v8
        with:
          name: site
          path: _site
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install html-validate
        run: npm install --no-save html-validate@9
      - name: Run html-validate
        run: npx html-validate "_site/**/*.html"

  link-check:
    name: link-check (advisory)
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Download site
        uses: actions/download-artifact@v8
        with:
          name: site
          path: _site
      - name: Run lychee link checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --max-redirects 5
            --cache
            --max-cache-age 1d
            --accept 200,204,206,301,302,303,307,308
            --exclude 'mailto:'
            --root-dir "$GITHUB_WORKSPACE/_site"
            _site

  spell-check:
    name: spell-check (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Run cspell
        uses: streetsidesoftware/cspell-action@v8
        with:
          config: .cspell.json
          incremental_files_only: false

  yaml-lint:
    name: yaml-lint (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install yamllint
        run: pipx install yamllint
      - name: Run yamllint
        run: |
          set -eu
          yamllint -c .yamllint.yml .github/ _config.yml

  actions-lint:
    name: actions-lint (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Run actionlint
        uses: raven-actions/actionlint@v2

  markdown-lint:
    name: markdown-lint (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: '**/*.md'
