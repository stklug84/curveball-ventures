# PR validation.
#
# Build + advisory quality checks live in the central reusable workflow:
#   stklug84/github-workflows/.github/workflows/jekyll-ci.yml
# This caller owns the trigger, permissions, and concurrency.
#
# Branch protection: the required status check is exposed as `validate / build`.
name: PR validation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: pr-validate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    uses: stklug84/github-workflows/.github/workflows/jekyll-ci.yml@v1
