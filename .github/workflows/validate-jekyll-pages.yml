---
# title: Validate Jekyll Pages workflow
# authors:
#   - Steffen Klug <45033201+stklug84@users.noreply.github.com>
# date: 2026-06-22
# keywords: [infrastructure, jekyll, ci]
# comment: |
#   PR validation. Build + quality checks live in the central reusable
#   workflow:
#     stklug84/github-workflows/.github/workflows/jekyll-validate-pages.yml
#   This caller owns the trigger, permissions, and concurrency.
#
#   As of v1.7.0 every quality check reports real pass/fail status (no
#   continue-on-error). This repo's ruleset does not require them, so
#   they are informational here; `validate / build` is the primary
#   signal.
# ---
name: Validate Jekyll Pages

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: pr-validate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    uses: stklug84/github-workflows/.github/workflows/jekyll-validate-pages.yml@v1.7.0
